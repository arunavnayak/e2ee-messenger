services:
  - type: web
    name: e2ee-messenger
    runtime: python
    region: virginia
    plan: free
    branch: master
    buildCommand: pip install -r requirements.txt
    # preDeployCommand runs SQL migration BEFORE the app starts
    preDeployCommand: psql $DATABASE_URL -f migrations/production.sql
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

        # This tells Render the value is managed in the Dashboard, not this file.
        # 'sync: false' ensures Render won't overwrite your Dashboard value with a blank.
      - key: DATABASE_URL
        sync: false

    autoDeploy: true